<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Harvest Deep Research</title>
  <!-- v4.0 - 5 sections (3 perplexity + SEC + technical, no earnings) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #1a1a2e;
      --cyan: #00d4ff;
      --purple: #a855f7;
      --magenta: #c026d3;
      --silver: #94a3b8;
      --white: #f8fafc;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(0,212,255,0.2);
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ticker-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      background: rgba(0,212,255,0.15);
      border: 1px solid rgba(0,212,255,0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
    }

    .company-name {
      font-size: 0.85rem;
      color: var(--silver);
      margin-left: 0.5rem;
    }

    .back-link {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--cyan);
      text-decoration: none;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: rgba(0,212,255,0.1);
      border-color: var(--cyan);
    }

    /* Status banner */
    .status-banner {
      text-align: center;
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-loading {
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--cyan);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-complete {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
    }

    .status-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }

    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* Research sections */
    .research-section {
      background: var(--surface);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .research-section:hover {
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 0 25px rgba(0,212,255,0.08);
    }

    .section-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--cyan);
      text-transform: uppercase;
      padding: 1rem 1.25rem;
      background: rgba(0,212,255,0.05);
      border-bottom: 1px solid rgba(0,212,255,0.1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-pending { background: var(--silver); animation: pulse 1s infinite; }
    .dot-complete { background: var(--green); }
    .dot-error { background: var(--red); }

    .section-body {
      padding: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--white);
    }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 4px;
      height: 1rem;
      margin-bottom: 0.75rem;
    }

    .skeleton:nth-child(2) { width: 85%; }
    .skeleton:nth-child(3) { width: 70%; }
    .skeleton:nth-child(4) { width: 90%; }
    .skeleton:nth-child(5) { width: 60%; }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Markdown rendering */
    .section-body h1, .section-body h2, .section-body h3, .section-body h4 {
      font-family: 'Orbitron', sans-serif;
      color: var(--cyan);
      margin: 1.25rem 0 0.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .section-body h1 { font-size: 1rem; }
    .section-body h2 { font-size: 0.9rem; }
    .section-body h3 { font-size: 0.85rem; color: var(--purple); }

    .section-body p { margin-bottom: 0.75rem; }

    .section-body ul, .section-body ol {
      margin: 0.5rem 0 1rem 1.5rem;
    }

    .section-body li {
      margin-bottom: 0.4rem;
      color: var(--silver);
    }

    .section-body strong { color: var(--white); font-weight: 600; }
    .section-body em { color: var(--purple); font-style: italic; }

    .section-body a {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,212,255,0.3);
      transition: border-color 0.2s ease;
    }

    .section-body a:hover { border-color: var(--cyan); }

    .section-body code {
      background: rgba(0,212,255,0.1);
      color: var(--cyan);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
    }

    .section-body blockquote {
      border-left: 3px solid var(--purple);
      padding-left: 1rem;
      color: var(--silver);
      margin: 0.75rem 0;
      font-style: italic;
    }

    .section-body hr {
      border: none;
      border-top: 1px solid rgba(0,212,255,0.15);
      margin: 1rem 0;
    }

    /* Markdown tables */
    .section-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.85rem;
    }

    .section-body th {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--cyan);
      text-align: left;
      padding: 0.6rem 0.75rem;
      background: rgba(0,212,255,0.08);
      border-bottom: 1px solid rgba(0,212,255,0.25);
    }

    .section-body td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: var(--silver);
      line-height: 1.5;
    }

    .section-body tr:hover td {
      background: rgba(0,212,255,0.04);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0,212,255,0.1);
      color: var(--silver);
      font-size: 0.75rem;
    }

    footer span { color: var(--cyan); }

    @media (max-width: 768px) {
      header { flex-direction: column; gap: 1rem; text-align: center; }
      .header-left { flex-direction: column; }
      body { padding: 0.75rem; }
      .logo { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <span class="logo">HARVEST DEEP RESEARCH</span>
        <span class="ticker-badge" id="ticker-badge">--</span>
        <span class="company-name" id="company-name"></span>
      </div>
      <a href="/" class="back-link">&larr; Back to Dashboard</a>
    </header>

    <div class="status-banner status-loading" id="status-banner">
      Initializing research...
    </div>

    <div id="sections">
      <div class="research-section" id="section-industryMomentum">
        <div class="section-header">
          <span class="section-status-dot dot-pending" id="dot-industryMomentum"></span>
          Industry Momentum Analysis
        </div>
        <div class="section-body" id="body-industryMomentum">
          <div class="skeleton" style="width:100%"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="research-section" id="section-competitiveTeardown">
        <div class="section-header">
          <span class="section-status-dot dot-pending" id="dot-competitiveTeardown"></span>
          Competitive Teardown
        </div>
        <div class="section-body" id="body-competitiveTeardown">
          <div class="skeleton" style="width:100%"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="research-section" id="section-policyRadar">
        <div class="section-header">
          <span class="section-status-dot dot-pending" id="dot-policyRadar"></span>
          Policy &amp; Regulation Radar
        </div>
        <div class="section-body" id="body-policyRadar">
          <div class="skeleton" style="width:100%"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="research-section" id="section-secFiling">
        <div class="section-header">
          <span class="section-status-dot dot-pending" id="dot-secFiling"></span>
          SEC Filing Analysis (10-K / 10-Q)
        </div>
        <div class="section-body" id="body-secFiling">
          <div class="skeleton" style="width:100%"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="research-section" id="section-technicalAnalysis">
        <div class="section-header">
          <span class="section-status-dot dot-pending" id="dot-technicalAnalysis"></span>
          Technical Analysis
        </div>
        <div class="section-body" id="body-technicalAnalysis">
          <div class="skeleton" style="width:100%"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <footer id="footer" style="display:none">
      <p>Generated: <span id="gen-date">--</span> &bull; Source: <span>Perplexity (sonar)</span> &bull; Harvest Trading Pipeline</p>
    </footer>
  </div>

  <script>
    // Markdown renderer with table support
    function renderMarkdown(text) {
      if (!text) return '';

      // Split into lines for block-level processing
      const lines = text.split('\n');
      const blocks = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // Detect table: line with pipes and next line is separator (|---|---|)
        if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
          const tableLines = [];
          while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
            tableLines.push(lines[i]);
            i++;
          }
          if (tableLines.length >= 2) {
            blocks.push({ type: 'table', lines: tableLines });
          } else {
            blocks.push({ type: 'line', text: tableLines[0] });
          }
          continue;
        }

        blocks.push({ type: 'line', text: line });
        i++;
      }

      // Render blocks
      let html = '';
      for (const block of blocks) {
        if (block.type === 'table') {
          html += renderTable(block.lines);
        } else {
          html += renderLine(block.text) + '\n';
        }
      }

      // Wrap consecutive <li> in <ul>
      html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`);

      return html;
    }

    function renderTable(tableLines) {
      // Parse header row
      const headerCells = parseTableRow(tableLines[0]);

      // Check if row 2 is a separator (|---|---|)
      let dataStart = 1;
      if (tableLines.length > 1 && /^\s*\|[\s\-:|]+\|\s*$/.test(tableLines[1])) {
        dataStart = 2;
      }

      let html = '<table><thead><tr>';
      for (const cell of headerCells) {
        html += `<th>${inlineFormat(cell)}</th>`;
      }
      html += '</tr></thead><tbody>';

      for (let r = dataStart; r < tableLines.length; r++) {
        const cells = parseTableRow(tableLines[r]);
        html += '<tr>';
        for (let c = 0; c < headerCells.length; c++) {
          html += `<td>${inlineFormat(cells[c] || '')}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    function parseTableRow(line) {
      // Split by | and trim, removing leading/trailing empty cells from outer pipes
      return line.split('|').map(c => c.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1);
    }

    function inlineFormat(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    }

    function renderLine(line) {
      const trimmed = line.trim();
      if (!trimmed) return '';

      // Headings
      if (trimmed.startsWith('#### ')) return `<h4>${inlineFormat(trimmed.slice(5))}</h4>`;
      if (trimmed.startsWith('### ')) return `<h3>${inlineFormat(trimmed.slice(4))}</h3>`;
      if (trimmed.startsWith('## ')) return `<h2>${inlineFormat(trimmed.slice(3))}</h2>`;
      if (trimmed.startsWith('# ')) return `<h1>${inlineFormat(trimmed.slice(2))}</h1>`;

      // Horizontal rule
      if (/^---+$/.test(trimmed)) return '<hr>';

      // Blockquote
      if (trimmed.startsWith('> ')) return `<blockquote>${inlineFormat(trimmed.slice(2))}</blockquote>`;

      // Unordered list item
      if (/^[-*] /.test(trimmed)) return `<li>${inlineFormat(trimmed.slice(2))}</li>`;

      // Ordered list item
      if (/^\d+\. /.test(trimmed)) return `<li>${inlineFormat(trimmed.replace(/^\d+\.\s*/, ''))}</li>`;

      // Paragraph
      return `<p>${inlineFormat(trimmed)}</p>`;
    }

    const params = new URLSearchParams(window.location.search);
    const TICKER = (params.get('ticker') || '').toUpperCase();

    if (!TICKER) {
      document.getElementById('status-banner').textContent = 'No ticker specified';
      document.getElementById('status-banner').className = 'status-banner status-error';
    } else {
      document.getElementById('ticker-badge').textContent = TICKER;
      document.title = `Research: ${TICKER} - Harvest`;
      initResearch();
    }

    async function fetchAPI(path, method = 'GET') {
      try {
        const r = await fetch(path, { method });
        return await r.json();
      } catch (e) {
        console.error('API error:', path, e);
        return null;
      }
    }

    function updateSection(key, section) {
      try {
        const dot = document.getElementById(`dot-${key}`);
        const body = document.getElementById(`body-${key}`);
        if (!dot || !body) {
          console.warn('Missing DOM element for section:', key);
          return;
        }

        if (section.status === 'complete') {
          dot.className = 'section-status-dot dot-complete';
          body.innerHTML = renderMarkdown(section.content);
        } else if (section.status === 'error') {
          dot.className = 'section-status-dot dot-error';
          body.innerHTML = `<p style="color:var(--red)">Error: ${section.error || 'Unknown error'}</p>`;
        }
        // pending = keep skeleton
      } catch (e) {
        console.error('Error rendering section', key, e);
        const body = document.getElementById(`body-${key}`);
        if (body) body.innerHTML = `<p style="color:var(--red)">Render error: ${e.message}</p>`;
      }
    }

    function updateBanner(status) {
      const banner = document.getElementById('status-banner');
      if (status === 'complete') {
        banner.textContent = 'Research complete';
        banner.className = 'status-banner status-complete';
      } else if (status === 'error') {
        banner.textContent = 'Research completed with errors';
        banner.className = 'status-banner status-error';
      } else if (status === 'in_progress') {
        banner.textContent = 'Researching... Perplexity is analyzing web data';
        banner.className = 'status-banner status-loading';
      } else {
        banner.textContent = 'Starting research...';
        banner.className = 'status-banner status-loading';
      }
    }

    function renderResult(data) {
      if (data.companyName) {
        document.getElementById('company-name').textContent = `${data.companyName} (${data.industry || ''})`;
      }

      if (data.sections) {
        for (const key of ['industryMomentum', 'competitiveTeardown', 'policyRadar', 'secFiling', 'technicalAnalysis']) {
          if (data.sections[key]) {
            updateSection(key, data.sections[key]);
          }
        }
      }

      updateBanner(data.status);

      if (data.generatedAt) {
        const footer = document.getElementById('footer');
        footer.style.display = 'block';
        const d = new Date(data.generatedAt);
        document.getElementById('gen-date').textContent = d.toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }
    }

    async function initResearch() {
      // First check if cached
      const cached = await fetchAPI(`/api/research/${TICKER}`);

      if (cached && cached.status === 'complete') {
        renderResult(cached);
        return;
      }

      if (cached && cached.status === 'in_progress') {
        // Already running, start polling
        updateBanner('in_progress');
        if (cached.sections) renderResult(cached);
        pollForResults();
        return;
      }

      // Not found - trigger research
      updateBanner('not_found');
      await fetchAPI(`/api/research/${TICKER}`, 'POST');
      updateBanner('in_progress');
      pollForResults();
    }

    let pollCount = 0;
    const MAX_POLLS = 60; // 60 * 3s = 3 minutes max

    async function pollForResults() {
      if (pollCount >= MAX_POLLS) {
        updateBanner('error');
        return;
      }

      pollCount++;
      const data = await fetchAPI(`/api/research/${TICKER}`);

      if (!data) {
        setTimeout(pollForResults, 3000);
        return;
      }

      renderResult(data);

      if (data.status === 'complete' || data.status === 'error') {
        return; // Done
      }

      setTimeout(pollForResults, 3000);
    }
  </script>
</body>
</html>
